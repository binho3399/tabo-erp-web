<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tabo ERP là hệ điều hành doanh nghiệp tất cả trong một, giúp quản lý bán hàng, kho bãi và tài chính trên một nền tảng duy nhất." />
  <meta name="theme-color" content="#0f172a" />
  <script>
    (function() {
      try {
        const theme = localStorage.getItem('tabo-theme');
        const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (theme === 'dark' || (!theme && supportDarkMode)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {}
    })();
  </script>
  <title>Điều hành doanh nghiệp tất cả trong một | Tabo ERP</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
